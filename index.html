<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Routine du dos">
<meta name="theme-color" content="#eef1ea">
<title>Routine du dos — 10 min</title>
<style>
  :root {
    --ink: #16211c;
    --paper: #eef1ea;
    --moss: #3c5a45;
    --moss-dark: #2a4032;
    --clay: #b5603e;
    --line: #c9d0c3;
    --gold: #c9a24b;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%;
    background: var(--paper);
    color: var(--ink);
    font-family: -apple-system, "SF Pro Text", "Helvetica Neue", sans-serif;
    overflow: hidden;
  }
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    padding: env(safe-area-inset-top) 20px env(safe-area-inset-bottom);
  }

  .header {
    padding: 18px 0 10px;
    text-align: center;
    flex-shrink: 0;
  }
  .header .eyebrow {
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--moss);
    font-weight: 600;
  }
  .header h1 {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 22px;
    margin: 4px 0 0;
    font-weight: 400;
    letter-spacing: 0.01em;
  }
  .progress-track {
    display: flex;
    gap: 5px;
    margin-top: 14px;
  }
  .progress-seg {
    flex: 1;
    height: 4px;
    border-radius: 2px;
    background: var(--line);
    overflow: hidden;
  }
  .progress-seg.done { background: var(--moss); }
  .progress-seg.active { background: var(--line); position: relative; }
  .progress-seg.active::after {
    content: "";
    position: absolute; left: 0; top: 0; bottom: 0;
    width: var(--fill, 0%);
    background: var(--clay);
    transition: width 0.2s linear;
  }

  .stage {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    min-height: 0;
  }
  .step-index {
    font-family: Georgia, serif;
    font-size: 13px;
    color: var(--clay);
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
  .step-name {
    font-family: Georgia, "Times New Roman", serif;
    font-size: 28px;
    line-height: 1.15;
    max-width: 320px;
    margin-bottom: 6px;
  }
  .step-detail {
    font-size: 14px;
    color: var(--moss-dark);
    margin-bottom: 28px;
    min-height: 18px;
  }

  .dial {
    position: relative;
    width: 230px;
    height: 230px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 30px;
  }
  .dial > svg.ring { position: absolute; top: 0; left: 0; transform: rotate(-90deg); }
  .dial .track { fill: none; stroke: var(--line); stroke-width: 6; }
  .dial .fill { fill: none; stroke: var(--clay); stroke-width: 6; stroke-linecap: round;
    transition: stroke-dashoffset 0.25s linear; }
  
  .illus-container {
    z-index: 1;
    height: 74px;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    margin-bottom: 4px;
    position: relative;
  }
  .illus-link {
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    border-radius: 8px;
    transition: background 0.2s;
  }
  .illus-link:active { background: rgba(0,0,0,0.05); }
  .illus-link::after {
    content: "▶";
    position: absolute;
    top: 2px;
    right: 2px;
    font-size: 12px;
    color: var(--clay);
    opacity: 0.6;
  }
  .illus-container svg { display: block; }
  
  .dial .time {
    font-family: Georgia, serif;
    font-size: 40px;
    font-variant-numeric: tabular-nums;
    font-weight: 400;
    z-index: 1;
  }

  .adjust-row {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
  }
  .adjust-btn {
    background: var(--paper);
    border: 1px solid var(--line);
    color: var(--moss-dark);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 16px;
    border-radius: 18px;
  }
  .adjust-btn:disabled {
    opacity: 0.3;
  }
  .adjust-btn:active:not(:disabled) {
    background: var(--line);
  }

  .controls {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 18px;
    flex-shrink: 0;
    padding: 6px 0 18px;
  }
  .btn {
    border: none;
    cursor: pointer;
    font-family: inherit;
    -webkit-appearance: none;
  }
  .btn-nav {
    background: none;
    color: var(--moss-dark);
    font-size: 13px;
    padding: 10px 6px;
    opacity: 0.75;
  }
  .btn-nav:disabled { opacity: 0.25; }
  .btn-main {
    width: 74px; height: 74px;
    border-radius: 50%;
    background: var(--moss);
    color: var(--paper);
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
    box-shadow: 0 4px 14px rgba(42,64,50,0.35);
  }
  .btn-main.running { background: var(--clay); }
  .btn-main:active { transform: scale(0.96); }

  .done-screen {
    position: fixed;
    inset: 0;
    display: none;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--paper);
    text-align: center;
    z-index: 999;
  }
  .done-screen.show { display: flex; }
  .done-screen .mark {
    font-family: Georgia, serif;
    font-size: 48px;
    font-weight: 300;
    color: var(--moss);
    margin-bottom: 12px;
  }
  .done-screen p {
    font-size: 16px;
    color: var(--moss-dark);
    margin-bottom: 32px;
  }
  .restart-btn {
    background: var(--moss);
    color: var(--paper);
    border: none;
    padding: 12px 28px;
    border-radius: 20px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
  }
  .restart-btn:active { transform: scale(0.96); }

  .app.finished {
    pointer-events: none;
  }
  .app.finished .header, 
  .app.finished .stage, 
  .app.finished .controls {
    opacity: 0.3;
  }
</style>
</head>
<body>
<div class="app" id="app">

  <div class="header">
    <div class="eyebrow">Bien-être</div>
    <h1>Routine du dos</h1>
    <div class="progress-track" id="progressTrack"></div>
  </div>

  <div class="stage" id="stage">
    <div class="step-index" id="stepIndex">Étape 1 / 6</div>
    <div class="step-name" id="stepName">Pont fessier</div>
    <div class="step-detail" id="stepDetail"></div>

    <div class="dial">
      <svg class="ring" width="230" height="230" viewBox="0 0 230 230">
        <circle class="track" cx="115" cy="115" r="104"/>
        <circle class="fill" cx="115" cy="115" r="104" id="dialFill"/>
      </svg>
      <div class="illus-container">
        <a class="illus-link" id="illustrationLink" href="#" target="_blank">
          <div class="illus" id="illus"></div>
        </a>
      </div>
      <div class="time" id="timeLabel">0:45</div>
    </div>

    <div class="adjust-row" id="adjustRow">
      <button class="btn adjust-btn" id="minusBtn">−15 s</button>
      <button class="btn adjust-btn" id="plusBtn">+15 s</button>
    </div>
  </div>

  <div class="controls" id="controls">
    <button class="btn btn-nav" id="prevBtn">Précédent</button>
    <button class="btn btn-main" id="mainBtn">Lancer</button>
    <button class="btn btn-nav" id="nextBtn">Suivant</button>
  </div>

  <div class="done-screen" id="doneScreen">
    <div class="mark">Terminé</div>
    <p>Séance du jour complète — bien joué.</p>
    <button class="restart-btn" id="restartBtn">Refaire la routine</button>
  </div>

</div>

<script>
const INK = '#2a4032';
const G = '<line x1="8" y1="67" x2="112" y2="67" stroke="#c9d0c3" stroke-width="2.5" stroke-linecap="round"/>';
const svgOpen = '<svg width="122" height="74" viewBox="0 0 120 72" aria-hidden="true">';

function limb(d, w, color) {
  return '<path d="' + d + '" fill="none" stroke="' + (color || INK) + '" stroke-width="' + w +
         '" stroke-linecap="round" stroke-linejoin="round"/>';
}
function head(cx, cy, r) {
  return '<circle cx="' + cx + '" cy="' + cy + '" r="' + (r || 6.5) + '" fill="' + INK + '"/>';
}

const ART = {
  pont: svgOpen + G +
    head(15, 56) +
    limb('M25 58 L56 41', 13) +
    limb('M55 41 L75 33', 10) +
    limb('M75 33 L80 59', 8) +
    limb('M77 62 L88 62', 5) +
    limb('M26 60 L46 63', 6) +
    '</svg>',

  birddog: svgOpen + G +
    head(41, 24) +
    limb('M51 31 L79 32', 13) +
    limb('M50 30 L18 20', 6.5) +
    limb('M52 34 L54 62', 6.5) +
    limb('M79 33 L82 58', 10) +
    limb('M82 59 L96 62', 7) +
    limb('M79 30 L112 19', 8) +
    '</svg>',

  gainage: svgOpen + G +
    head(22, 27) +
    limb('M30 39 L62 49', 14) +
    limb('M62 49 L97 60', 10) +
    limb('M29 41 L22 61', 6.5) +
    limb('M22 62 L38 63', 6) +
    limb('M31 37 L37 17', 6) +
    '</svg>',

  flechisseurs: svgOpen + G +
    head(63, 10) +
    limb('M62 19 L57 40', 13) +
    limb('M57 40 L37 42', 10) +
    limb('M37 42 L31 61', 8) +
    limb('M28 63 L39 64', 5) +
    limb('M58 41 L79 58', 10) +
    limb('M80 60 L97 62', 7) +
    limb('M62 20 L68 37', 6) +
    '</svg>',

  enfant: svgOpen + G +
    head(37, 55, 6) +
    limb('M46 58 Q60 42 75 49', 13) +
    limb('M75 49 L77 60', 11) +
    limb('M77 61 L92 62', 7) +
    limb('M45 61 L18 63', 6) +
    '</svg>',

  inversion: svgOpen + G +
    limb('M52 66 L64 40 L80 66', 3.5, '#c9a24b') +
    limb('M16 56 L106 26', 5, '#3c5a45') +
    head(25, 42, 6) +
    limb('M34 44 L64 35', 12) +
    limb('M64 35 L92 24', 9) +
    limb('M94 24 L99 15', 5) +
    '</svg>'
};

const steps = [
  { name: "Pont fessier", detail: "3 séries × 12 répétitions", seconds: 45, manualReps: true, sets: 3, art: "pont", youtube: "https://www.youtube.com/watch?v=m7qQiAUcWaE" },
  { name: "Bird-dog", detail: "3 séries × 10 répétitions / côté", seconds: 45, manualReps: true, sets: 3, art: "birddog", youtube: "https://www.youtube.com/watch?v=ZmW47SX0lts" },
  { name: "Gainage latéral", detail: "3 × 20 s de chaque côté", seconds: 20, sets: 6, sideLabel: true, art: "gainage", youtube: "https://www.youtube.com/watch?v=hAWS7C17uJY" },
  { name: "Étirement fléchisseurs de hanche", detail: "30 s par côté", seconds: 30, sets: 2, sideLabel: true, art: "flechisseurs", youtube: "https://www.youtube.com/watch?v=giDSVGloruo" },
  { name: "Étirement du dos", detail: "Position de l'enfant", seconds: 60, art: "enfant", youtube: "https://www.youtube.com/watch?v=KRmTMtWtWjQ" },
  { name: "Table d'inversion", detail: "Angle débutant 20–30° · décompression douce", seconds: 90, art: "inversion", youtube: "https://www.youtube.com/watch?v=jjT3Tz5fYKM" }
];

let current = 0;
let subSet = 0;
let remaining = 0;
let timerId = null;
let running = false;
const RADIUS = 104;
const CIRC = 2 * Math.PI * RADIUS;

const appEl = document.getElementById('app');
const progressTrack = document.getElementById('progressTrack');
const stepIndexEl = document.getElementById('stepIndex');
const stepNameEl = document.getElementById('stepName');
const stepDetailEl = document.getElementById('stepDetail');
const illusEl = document.getElementById('illus');
const illustrationLink = document.getElementById('illustrationLink');
const timeLabelEl = document.getElementById('timeLabel');
const dialFill = document.getElementById('dialFill');
const minusBtn = document.getElementById('minusBtn');
const plusBtn = document.getElementById('plusBtn');
const mainBtn = document.getElementById('mainBtn');
const prevBtn = document.getElementById('prevBtn');
const nextBtn = document.getElementById('nextBtn');
const doneScreen = document.getElementById('doneScreen');
const restartBtn = document.getElementById('restartBtn');

for (let i = 0; i < steps.length; i++) {
  progressTrack.innerHTML += '<div class="progress-seg"></div>';
}

dialFill.style.strokeDasharray = CIRC;

function fmt(sec) {
  const m = Math.floor(sec / 60);
  const s = sec % 60;
  return m + ':' + (s < 10 ? '0' : '') + s;
}

function loadStep(i, resetSet) {
  clearInterval(timerId);
  running = false;
  current = i;
  if (resetSet !== false) subSet = 0;
  const step = steps[current];
  remaining = step.seconds;

  stepIndexEl.textContent = 'Étape ' + (current + 1) + ' / ' + steps.length;
  stepNameEl.textContent = step.name;
  illusEl.innerHTML = ART[step.art] || '';
  illustrationLink.href = step.youtube;

  let detail = step.detail;
  if (step.sets && step.sets > 1) {
    if (step.sideLabel) {
      const side = subSet % 2 === 0 ? 'droite' : 'gauche';
      detail = step.detail + ' — série ' + (Math.floor(subSet/2)+1) + '/' + Math.ceil(step.sets/2) + ', côté ' + side;
    } else {
      detail = step.detail + ' — série ' + (subSet + 1) + '/' + step.sets;
    }
  }
  stepDetailEl.textContent = detail;

  updateDial();
  mainBtn.textContent = 'Lancer';
  mainBtn.classList.remove('running');

  prevBtn.disabled = current === 0;
  nextBtn.disabled = current === steps.length - 1;

  document.querySelectorAll('.progress-seg').forEach((seg, idx) => {
    seg.classList.remove('done', 'active');
    seg.style.removeProperty('--fill');
    if (idx < current) seg.classList.add('done');
    if (idx === current) seg.classList.add('active');
  });
}

function updateDial() {
  const step = steps[current];
  timeLabelEl.textContent = fmt(remaining);
  const frac = remaining / step.seconds;
  dialFill.style.strokeDashoffset = CIRC * (1 - frac);
  const activeSeg = document.querySelector('.progress-seg.active');
  if (activeSeg) activeSeg.style.setProperty('--fill', ((1 - frac) * 100) + '%');
}

function tick() {
  remaining--;
  if (remaining <= 0) {
    const step = steps[current];
    if (step.sets && subSet < step.sets - 1) {
      subSet++;
      remaining = step.seconds;
      loadStep(current, false);
      startTimer();
    } else {
      clearInterval(timerId);
      running = false;
      goNext(true);
    }
    return;
  }
  updateDial();
}

function startTimer() {
  running = true;
  mainBtn.textContent = 'Pause';
  mainBtn.classList.add('running');
  timerId = setInterval(tick, 1000);
}

function pauseTimer() {
  running = false;
  clearInterval(timerId);
  mainBtn.textContent = 'Reprendre';
  mainBtn.classList.remove('running');
}

function goNext(auto) {
  if (current < steps.length - 1) {
    loadStep(current + 1);
    if (auto) startTimer();
  } else {
    finishRoutine();
  }
}

function goPrev() {
  if (current > 0) loadStep(current - 1);
}

function finishRoutine() {
  clearInterval(timerId);
  document.querySelectorAll('.progress-seg').forEach(seg => seg.classList.add('done'));
  appEl.classList.add('finished');
  doneScreen.classList.add('show');
}

function adjustDuration(delta) {
  if (running) return;
  const step = steps[current];
  step.seconds = Math.max(15, step.seconds + delta);
  remaining = step.seconds;
  updateDial();
}

minusBtn.addEventListener('click', () => adjustDuration(-15));
plusBtn.addEventListener('click', () => adjustDuration(15));

mainBtn.addEventListener('click', () => {
  if (running) pauseTimer();
  else startTimer();
});
prevBtn.addEventListener('click', goPrev);
nextBtn.addEventListener('click', () => goNext(false));
restartBtn.addEventListener('click', () => {
  appEl.classList.remove('finished');
  doneScreen.classList.remove('show');
  loadStep(0);
});

loadStep(0);
</script>
</body>
</html>
